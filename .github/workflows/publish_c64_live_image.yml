name: Publish c64-live image

on:
  push:
    branches: [master]
    paths:
      - 'docker/Dockerfile.headless'
      - 'docker/entrypoint.sh'
      - 'bin/**'
      - 'src/headless/**'
      - 'src/emulator/**'
      - 'src/types/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish_c64_live_image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate runtime entrypoint sources
        run: |
          set -euo pipefail
          for f in bin/admin.mjs bin/headless.mjs bin/serve.mjs; do
            test -s "$f" || { echo "::error file=$f::File is missing or empty"; exit 1; }
            ls -l "$f"
          done

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Compute short git hash
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build preflight image and verify entrypoints
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --file docker/Dockerfile.headless \
            --tag c64-live-ci:preflight \
            --build-arg GIT_HASH=${{ steps.vars.outputs.short_sha }} \
            .
          docker run --rm --entrypoint sh c64-live-ci:preflight -c '
            set -e
            for f in bin/admin.mjs bin/headless.mjs bin/serve.mjs; do
              test -s "$f"
            done
            wc -c bin/*.mjs
          '

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/c64-live
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.headless
          platforms: linux/amd64
          no-cache: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_HASH=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print published digest
        run: 'echo "Published digest: ${{ steps.build_push.outputs.digest }}"'
