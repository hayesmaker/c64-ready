name: Publish docs to Wiki

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/publish_wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Sync docs and generate Home.md
        run: |
          rm -f wiki/*.md
          cp docs/*.md wiki/
          cp CHANGELOG.md wiki/
          cd wiki

          # Build Home.md from scratch.
          # Titles are read from the first # heading of each file — no hardcoded list needed.
          # Order: PROJECT_OVERVIEW first, CHANGELOG last, everything else alphabetically between.
          printf '# c64-ready Wiki\n\nCommodore 64 emulator for the browser and Node.js.\n\n## Documentation\n\n' > Home.md

          emit_link() {
            local file="$1"
            local title
            title=$(grep -m1 '^# ' "$file" | sed 's/^# //')
            [ -z "$title" ] && title="${file%.md}"
            local page="${file%.md}"
            echo "- [${title}](${page// /%20})" >> Home.md
          }

          # Pin PROJECT_OVERVIEW first
          [ -f PROJECT_OVERVIEW.md ] && emit_link PROJECT_OVERVIEW.md

          # All other docs alphabetically, excluding pinned files
          for f in $(printf '%s\n' *.md | sort); do
            [ "$f" = "Home.md" ]          && continue
            [ "$f" = "PROJECT_OVERVIEW.md" ] && continue
            [ "$f" = "CHANGELOG.md" ]     && continue
            emit_link "$f"
          done

          # Pin CHANGELOG last
          [ -f CHANGELOG.md ] && emit_link CHANGELOG.md

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki
          git add .
          git commit -m "chore(wiki): sync docs/ → wiki [skip ci]" || echo "Nothing to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master
