name: Publish PROJECT_OVERVIEW to Wiki

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pages: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (use Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Confirm Node version
        run: |
          echo "PATH=$PATH"
          echo "which node: $(which node || true)"
          node -v || true
          npm -v || true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check repository metadata (debug)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Inspecting repository via API: ${{ github.repository }}"
          # Query repository metadata and print key fields (no secrets will be printed)
          resp=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" https://api.github.com/repos/${{ github.repository }}) || true
          # Use jq to print a few key fields. If jq is missing, fall back to raw output.
          if command -v jq >/dev/null 2>&1; then
            echo "$resp" | jq -r '"full_name: \(.full_name)", "private: \(.private)", "has_wiki: \(.has_wiki)", ("permissions: " + (.permissions|tojson))'
          else
            echo "$resp"
          fi

      - name: Clone wiki (authenticated)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki || true
          echo "--- wiki dir listing ---"
          ls -la wiki || true
          echo "--- wiki remotes ---"
          git -C wiki remote -v || true
          echo "--- wiki branches ---"
          git -C wiki branch -a || true
          echo "--- wiki last commit ---"
          git -C wiki log -1 --pretty=oneline || true

      - name: Copy overview
        run: |
          mkdir -p wiki
          cp PROJECT_OVERVIEW.md wiki/"Project Overview.md"
          # Overwrite the wiki Home page with a curated landing page that links to Project Overview.
          HOME=wiki/Home.md
          echo "# Home" > "$HOME"
          echo "" >> "$HOME"
          echo "Welcome to the project wiki." >> "$HOME"
          echo "" >> "$HOME"
          echo "## Quick links" >> "$HOME"
          echo "" >> "$HOME"
          echo "- [Project Overview](Project%20Overview)" >> "$HOME"
          echo "" >> "$HOME"
          echo "---" >> "$HOME"
          echo "This Home page was generated automatically by the repository workflow. Edit the wiki on GitHub if you want to customize the landing page." >> "$HOME"
          echo "Wrote Home.md (overwritten) and Project Overview.md"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          cd wiki
          # Add both the Project Overview page and Home page (if present) so both are committed.
          git add "Project Overview.md" "Home.md" || true
          git commit -m "Update Project Overview and Home (auto)" || echo "no changes"
          echo "--- after commit: status ---"
          git status --porcelain || true
          echo "--- after commit: recent commits ---"
          git log -5 --oneline || true
          # Push to the wiki branch 'master' (this repository uses 'master' as the trunk).
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master || \
            (echo "Failed to push to wiki on branch 'master'. Check repository wiki branch and token permissions." && exit 1)
          echo "--- push complete ---"
          git branch -a || true
          git show --name-only --pretty="format:Commit: %h %s" HEAD || true

      - name: Verify wiki contents via API (debug)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking wiki repo for Project_Overview.md"
          resp=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}.wiki/contents/Project%20Overview.md) || true
          # If jq is available, use it to extract the base64 content, decode and print a head; otherwise print raw JSON.
          if command -v jq >/dev/null 2>&1; then
            content=$(echo "$resp" | jq -r '.content // empty') || true
            if [ -n "$content" ]; then
              echo "FOUND file: Project Overview.md"
              echo "sha: $(echo "$resp" | jq -r '.sha // empty')"
              echo "---- decoded head ----"
              echo "$content" | base64 --decode | sed -n '1,120p' || true
              echo "---- end decoded head ----"
            else
              echo "API response:"
              echo "$resp"
            fi
          else
            echo "$resp"
          fi
          echo "\nChecking wiki repo for Home.md"
          resp2=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}.wiki/contents/Home.md) || true
          if command -v jq >/dev/null 2>&1; then
            head=$(echo "$resp2" | jq -r '.content // empty' | base64 --decode 2>/dev/null | sed -n '1,60p' || true)
            if [ -n "$head" ]; then
              echo "FOUND Home.md (decoded head):"
              echo "$head"
            else
              echo "Home.md API response:"
              echo "$resp2"
            fi
          else
            echo "$resp2"
          fi

