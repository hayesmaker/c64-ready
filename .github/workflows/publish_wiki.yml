name: Publish docs to Wiki

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.github/workflows/publish_wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Sync docs and generate Home.md
        run: |
          cp docs/*.md wiki/
          cp CHANGELOG.md wiki/
          cd wiki

          # Build Home.md from scratch
          printf '# c64-ready Wiki\n\nCommodore 64 emulator for the browser and Node.js.\n\n## Documentation\n\n' > Home.md

          # Pages in display order with friendly titles
          declare -A TITLES
          TITLES["PROJECT_OVERVIEW.md"]="Project Overview"
          TITLES["AUDIO_ENGINE.md"]="Audio Engine"
          TITLES["HEADLESS_RUNNING.md"]="Headless Running"
          TITLES["HEADLESS_INPUT.md"]="Headless Input API"
          TITLES["CHANGELOG_RELEASES.md"]="Changelog & Releases"
          TITLES["WIKI_PUBLISHING.md"]="Wiki Publishing"
          TITLES["CHANGELOG.md"]="Changelog"

          ORDER=(
            PROJECT_OVERVIEW.md
            AUDIO_ENGINE.md
            HEADLESS_RUNNING.md
            HEADLESS_INPUT.md
            CHANGELOG_RELEASES.md
            WIKI_PUBLISHING.md
            CHANGELOG.md
          )

          for file in "${ORDER[@]}"; do
            if [ -f "$file" ]; then
              title="${TITLES[$file]}"
              page="${file%.md}"
              echo "- [${title}](${page// /%20})" >> Home.md
            fi
          done

          # Append any docs not listed in ORDER (future-proofing)
          for f in *.md; do
            [ "$f" = "Home.md" ] && continue
            base=$(basename "$f")
            found=0
            for o in "${ORDER[@]}"; do [ "$o" = "$base" ] && found=1 && break; done
            if [ "$found" = "0" ]; then
              title=$(sed -n '/^#/{s/^#\s*//;p;q}' "$f")
              [ -z "$title" ] && title="${base%.md}"
              page="${base%.md}"
              echo "- [${title}](${page// /%20})" >> Home.md
            fi
          done

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki
          git add .
          git commit -m "chore(wiki): sync docs/ → wiki [skip ci]" || echo "Nothing to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git HEAD:master
