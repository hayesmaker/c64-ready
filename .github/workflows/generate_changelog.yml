name: Generate Changelog

on:
  push:
    branches: [ master ]
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run changelog generator (push event)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PUBLISH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
          CREATE_CHANGELOG_PR: true
        run: |
          node --version
          npm ci --no-audit --no-fund || true
          # On push to master, create/update a changelog PR.
          node tools/generate_changelog.js --create-pr

      # For release-triggered events, run the generator in PR-creation mode.
      - name: Run changelog generator (release event)
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PUBLISH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
          CREATE_CHANGELOG_PR: true
        run: |
          node --version
          npm ci --no-audit --no-fund || true
          # Explicitly request PR creation for release-triggered workflow
          node tools/generate_changelog.js --create-pr
