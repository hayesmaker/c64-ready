# ─────────────────────────────────────────────────────────────────────────────
# c64-ready — Docker Compose
#
# Services:
#   headless  — Headless C64 emulator (WebRTC player page on port 9002)
#
# Quick start:
#   cp docker/.env.example docker/.env   # edit to taste
#   docker compose up --build
#   Open http://localhost:9002 in a browser
#
# Stop:
#   docker compose down
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Headless C64 player ─────────────────────────────────────────────────────
  headless:
    build:
      context: .
      dockerfile: docker/Dockerfile.headless
      args:
        # Bake the current commit hash into the image so the headless server
        # can report it in the WebSocket hello message.
        # docker compose build resolves this shell substitution on the host.
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: c64-headless
    restart: unless-stopped
    # ── Environment variables ─────────────────────────────────────────────────
    # All runtime config comes from docker/.env (copy from docker/.env.example).
    # Edit docker/.env to switch modes, set game path, fps, etc.
    env_file:
      - path: docker/.env
        required: false
    ports:
      - '${WS_HOST_PORT:-9001}:9001' # WebSocket input server
      - '${WEBRTC_HOST_PORT:-9002}:9002' # WebRTC player page + signalling
      - '50000-50100:50000-50100/udp' # ICE/SRTP UDP port range
    # Keep only logs on a bind mount. Runtime code + public assets are baked
    # into the image by docker/Dockerfile.headless.
    volumes:
      - ./logs:/app/logs
