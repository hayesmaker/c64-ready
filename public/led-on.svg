<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- The plastic "well" shading -->
        <linearGradient id="well" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#403E38"/>
            <stop offset="100%" stop-color="#605E58"/>
        </linearGradient>
        <!-- The glowing LED lens -->
        <radialGradient id="led-glow" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#FF6666"/>
            <stop offset="70%" stop-color="#CC0000"/>
            <stop offset="100%" stop-color="#880000"/>
        </radialGradient>
    </defs>

    <!-- C64 Case Surface -->
    <rect width="32" height="32" rx="4" fill="#8E8A7E"/>

    <!-- The circular "well" (The hole in the case) -->
    <circle cx="16" cy="16" r="10" fill="url(#well)"/>

    <!-- The LED itself -->
    <circle cx="16" cy="16" r="7" fill="url(#led-glow)"/>

    <!-- Subtle highlight on the plastic lens -->
    <circle cx="14" cy="14" r="2" fill="white" fill-opacity="0.3"/>
</svg>